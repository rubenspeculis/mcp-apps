name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm Trusted Publishing (OIDC) — no NPM_TOKEN needed

jobs:
  release:
    runs-on: ubuntu-latest
    # Disable lefthook git hooks for the whole job: the changesets action commits
    # "Version Packages" (not a conventional message) and pushes tags, both of
    # which would otherwise trip the commit-msg/pre-push hooks installed by the
    # `prepare` script during `pnpm install`. CI gating happens in the PR check.
    env:
      LEFTHOOK: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so changesets can read tags

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # No `registry-url`: it writes an .npmrc auth placeholder that interferes
      # with OIDC. pnpm publishes to the default npm registry and authenticates
      # via the workflow's OIDC identity (Trusted Publishing).
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When changesets exist, opens/updates a "Version Packages" PR. When that
      # PR is merged (no changesets remain), runs `pnpm ship` — which publishes
      # via `pnpm -r publish`. No NPM_TOKEN: pnpm authenticates over OIDC, which
      # must be registered as a Trusted Publisher for each package on npmjs.com.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm ship
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On a release run (no pending changesets), tag the published versions:
      # per-package tags via `changeset tag`, plus the `v<version>` tag the
      # scaffolded Flutter `mcpapps_bridge` git dep pins to (`ref: v<version>`).
      - name: Tag published release
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          pnpm exec changeset tag || true
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          git tag "v${VERSION}" 2>/dev/null || true
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
