name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm Trusted Publishing (OIDC) — no NPM_TOKEN needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so changesets can read tags

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1. `changeset publish` shells
      # out to `npm publish`, so upgrade the runner's bundled npm (Node 22 ships
      # npm 10.x). npm then mints provenance + auth from the OIDC token itself.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When changesets exist, opens/updates a "Version Packages" PR. When that
      # PR is merged (no changesets remain), runs `pnpm ship` to publish to npm.
      # No NPM_TOKEN: npm authenticates via the workflow's OIDC identity, which
      # must be registered as a Trusted Publisher for each package on npmjs.com.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm ship
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Scaffolded Flutter apps pin `mcpapps_bridge` to `ref: v<version>` (a git
      # dep). changeset publish only cuts per-package tags, so mint the matching
      # `v<version>` tag here once a publish happens.
      - name: Tag release for the Flutter bridge git dep
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
