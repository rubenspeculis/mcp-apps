packages:
  - "packages/*"
  - "examples/*"
  - "docs"

# Supply-chain safety: refuse to install a published version until it is 7 days
# old (10080 minutes). Excludes our own scopes so internal releases are instant.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@otivo-labs/*"
  - "@peculis/*"
  - "@mcpapps/*"
  # Docs site (private Nuxt/Docus app) — fast-moving ecosystem, not a published
  # supply-chain surface, so exempt from the 7-day maturity gate.
  - "docus"
  - "exsolve"
  - "@iconify-json/*"
  - '@cloudflare/workerd-darwin-64@1.20260625.1'
  - '@cloudflare/workerd-darwin-arm64@1.20260625.1'
  - '@cloudflare/workerd-linux-64@1.20260625.1'
  - '@cloudflare/workerd-linux-arm64@1.20260625.1'
  - '@cloudflare/workerd-windows-64@1.20260625.1'
  - miniflare@4.20260625.0
  - workerd@1.20260625.1
  - wrangler@4.105.0

# Single source of truth for shared tooling + framework versions. Bump HERE,
# nowhere else. Packages reference these with "catalog:" instead of a literal.
catalog:
  # tooling
  "@biomejs/biome": 2.5.0
  turbo: 2.9.18
  vitest: 4.1.9
  "@vitest/coverage-v8": 4.1.9
  typescript: 5.7.2
  "@types/node": 22.10.2
  lefthook: 2.1.9
  "@commitlint/cli": 21.0.2
  "@commitlint/config-conventional": 21.0.2
  tsup: 8.3.5
  tsx: 4.22.4
  jiti: 2.4.2
  esbuild: 0.25.12
  wrangler: 4.105.0
  "@changesets/cli": 2.31.0
  # `mcpapps audit --runtime` drives the dev emulator in a headless browser.
  # Lazy-imported by the CLI, so it stays a dev/CI-only dep (never shipped).
  playwright: 1.61.0
  # framework runtime
  hono: 4.12.26
  "@hono/node-server": 1.19.14
  zod: 4.2.1
  "zod-to-json-schema": 3.24.1
  "@modelcontextprotocol/sdk": 1.12.0
  # vue renderer
  vue: 3.5.38
  vite: 6.4.3
  "@vitejs/plugin-vue": 5.2.1
  jsdom: 25.0.1

allowBuilds:
  "@parcel/watcher": true
  better-sqlite3: true
  esbuild: true
  lefthook: true
  sharp: true
  vue-demi: true
  workerd: true

overrides:
  tmp: ">=0.2.7"
  js-yaml: ">=4.2.0"
  # changesets' read-yaml-file@1 calls js-yaml's v3 `safeLoad`, removed in v4.
  # Scope it back to the patched final v3 so the global v4 override above (kept
  # for security elsewhere) doesn't break `changeset version`/`status`.
  "read-yaml-file>js-yaml": "3.14.1"
  undici: ">=6.27.0"
  ws: ">=8.21.0"
  esbuild: ">=0.24.3"
